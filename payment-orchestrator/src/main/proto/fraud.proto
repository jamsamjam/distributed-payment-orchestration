syntax = "proto3";

package dpo.fraud;

option java_multiple_files = true;
option java_package = "com.dpo.fraud";

import "google/protobuf/timestamp.proto";

service FraudService {
  rpc ScoreTransaction (FraudRequest) returns (FraudResponse);
}

message FraudRequest {
  string transaction_id = 1;
  int64 amount_cents = 2;
  string currency = 3;
  string merchant_id = 4;
  string card_last4 = 5;
  string card_country = 6;
  google.protobuf.Timestamp timestamp = 7;
}

enum FraudDecision {
  FRAUD_DECISION_UNSPECIFIED = 0;
  ALLOW = 1;
  FLAG = 2;
  BLOCK = 3;
}

message FraudResponse {
  string transaction_id = 1;
  int32 score = 2;
  FraudDecision decision = 3;
  repeated string reasons = 4;
  int64 latency_ms = 5;
}
