spring:
  application:
    name: payment-orchestrator
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/orchestrator}
    username: ${SPRING_DATASOURCE_USERNAME:dpo}
    password: ${SPRING_DATASOURCE_PASSWORD:dpo}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: 200
      min-spare: 20

fraud:
  block-threshold: ${FRAUD_BLOCK_THRESHOLD:80}
  flag-threshold: ${FRAUD_FLAG_THRESHOLD:50}

app:
  redis:
    stream-key: ${REDIS_STREAM_KEY:dpo:events}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.dpo: INFO
