spring:
  application:
    name: provider-router
  grpc:
    server:
      port: ${GRPC_PORT:50053}

server:
  port: ${SERVER_PORT:8081}

provider:
  mock:
    url: ${PROVIDER_MOCK_URL:http://localhost:9000}
  circuit-breaker:
    failure-threshold: 3
    recovery-timeout-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.dpo: INFO
