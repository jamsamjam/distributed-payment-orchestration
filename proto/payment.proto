syntax = "proto3";

package pulsepay.payment;

option java_multiple_files = true;
option java_package = "com.pulsepay.proto.payment";

import "google/protobuf/timestamp.proto";

service PaymentService {
  rpc InitiatePayment (PaymentRequest) returns (PaymentResponse);
  rpc GetTransaction (GetTransactionRequest) returns (TransactionResponse);
}

message PaymentRequest {
  string idempotency_key = 1;
  double amount = 2;
  string currency = 3;
  string merchant_id = 4;
  string card_last4 = 5;
  string card_country = 6;
  string card_holder = 7;
  string card_expiry = 8;
  map<string, string> metadata = 9;
}

message PaymentResponse {
  string transaction_id = 1;
  string status = 2;
  string provider = 3;
  string provider_txn_id = 4;
  int32 fraud_score = 5;
  string fraud_decision = 6;
  repeated string fraud_reasons = 7;
  string error_message = 8;
  google.protobuf.Timestamp created_at = 9;
}

message GetTransactionRequest {
  string transaction_id = 1;
}

message TransactionResponse {
  string transaction_id = 1;
  string idempotency_key = 2;
  string status = 3;
  double amount = 4;
  string currency = 5;
  string merchant_id = 6;
  string card_last4 = 7;
  int32 fraud_score = 8;
  string provider = 9;
  string provider_txn_id = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}
